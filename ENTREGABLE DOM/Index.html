<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Urban Sneakers</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <h1>🛍️ Urban Sneakers</h1>
</header>

<main class="container">

  <!-- FORMULARIO -->
  <section class="form-section">
    <h2>Agregar / Editar Producto</h2>

    <form id="productForm">
      <input type="text" id="image" placeholder="URL Imagen" required>
      <input type="text" id="title" placeholder="Nombre del producto" required>
      <input type="text" id="description" placeholder="Descripción" required>
      <input type="number" id="price" placeholder="Precio" required>
      <input type="text" id="coupon" placeholder="Cupón (DESC50)">
      <button type="submit">Guardar Producto</button>
    </form>
  </section>

  <!-- PRODUCTOS -->
  <section class="products-section">
    <h2>Productos</h2>
    <p id="emptyMessage">No hay productos aún 👀</p>
    <div id="productList" class="grid"></div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
